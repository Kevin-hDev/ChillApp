      - "Ajouter ProgressiveConfirmation dans le meme fichier"
      - "Envelopper chaque disable* avec ProgressiveConfirmation.show()"
      - "DangerLevel.high pour firewall, AppArmor. DangerLevel.medium pour le reste"
      - "Le dialogue force 3-5s d'attente + saisie CONFIRMER pour high"
    before_code: |
      onPressed: () => SecurityCommands.disableLinuxFirewall()
    after_code: |
      onPressed: () async {
        final result = await ProgressiveConfirmation.show(
