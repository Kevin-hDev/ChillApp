  - id: FIX-001
    gap_ref: GAP-001
    category: RT
    title: "Nettoyage securise de la memoire pour les secrets"
    priority: P0
    target_file: "lib/features/lock/lock_provider.dart"
    insertion_point:
      file: "lib/core/security/secure_memory.dart"
      method: "new_file"
    code_file: "code/blindage_code/fix_001_secure_memory.dart"
    test_file: "code/blindage_code/test_fix_001.dart"
    integration_steps:
      - "Creer lib/core/security/secure_memory.dart avec le contenu de fix_001"
      - "Dans lock_provider.dart, importer secure_memory.dart"
      - "Remplacer String pin par SecureBytes pinBytes = SecureBytes.fromString(pin)"
      - "Envelopper les operations crypto dans try/finally avec pinBytes.dispose()"
      - "Utiliser constantTimeEquals au lieu de _constantTimeEquals pour les bytes"
    before_code: |
      String _hashPin(String pin, String salt) {
        final derived = _pbkdf2(pin, salt);
        return base64Encode(derived);
      }
    after_code: |
      Future<String> _hashPin(String pin, String salt) async {
        final pinBytes = SecureBytes.fromString(pin);
        try {
          return await CryptoIsolate.hashPinIsolated(pin, salt);
        } finally {
          pinBytes.secureDispose();
        }
      }
    impact: "Les secrets sont zeroises apres usage. Reduit la fenetre d'exposition en memoire"
    effort: "2 heures"

  - id: FIX-002
    gap_ref: GAP-002
