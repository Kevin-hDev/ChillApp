      method: "new_file"
    code_file: "code/blindage_code/fix_002_secure_error_handling.dart"
    test_file: "code/blindage_code/test_fix_002.dart"
    integration_steps:
      - "Creer lib/core/security/secure_error_handler.dart avec le contenu de fix_002"
      - "Modifier lib/main.dart :"
      - "  Ajouter SecureErrorHandler.initialize() apres WidgetsFlutterBinding"
      - "  Remplacer runApp() par SecureErrorHandler.runSecureApp()"
      - "Les stack traces sont filtrees en production, affichees en debug"
    before_code: |
      void main() async {
        WidgetsFlutterBinding.ensureInitialized();
        final prefs = await SharedPreferences.getInstance();
        runApp(ProviderScope(...));
      }
    after_code: |
      void main() async {
        WidgetsFlutterBinding.ensureInitialized();
        SecureErrorHandler.initialize();
        final prefs = await SharedPreferences.getInstance();
        SecureErrorHandler.runSecureApp(ProviderScope(...));
      }
    impact: "Aucune stack trace ni info sensible ne fuite en production"
    effort: "30 minutes"

