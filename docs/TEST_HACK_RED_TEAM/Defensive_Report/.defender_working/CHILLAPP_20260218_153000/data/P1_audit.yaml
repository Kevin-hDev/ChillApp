      description: "Daemon Go utilisant tsnet pour tunnel Tailscale + SSH forwarding"
      binaries: 3
      binary_size: "~33Mo chaque"
      integrity_verification: false

existing_protections:

  # ============================================
  # RT - Runtime Dart
  # ============================================

  - id: PROT-001
    category: RT
    title: "Random.secure() pour generation de sel cryptographique"
    location: "lib/features/lock/lock_provider.dart:80"
    effectiveness: "forte"
    notes: "Utilise correctement Random.secure() (wrapper /dev/urandom). Conforme CWE-330."

  - id: PROT-002
    category: RT
    title: "PBKDF2-HMAC-SHA256 avec 100 000 iterations pour le hash PIN"
    location: "lib/features/lock/lock_provider.dart:86-112"
    effectiveness: "forte"
    notes: "Implementation PBKDF2 correcte. 100k iterations rend le brute force GPU impraticable (~heures)."

  - id: PROT-003
    category: RT
    title: "Comparaison en temps constant pour verification du hash PIN"
    location: "lib/features/lock/lock_provider.dart:120-127"
    effectiveness: "forte"
    notes: "Implementation XOR sans court-circuit conforme. Protege contre les timing attacks sur la comparaison du PIN hashe."

  - id: PROT-004
    category: RT
    title: "Validation stricte du format PIN (8 chiffres, regex)"
    location: "lib/features/lock/lock_provider.dart:144"
    effectiveness: "forte"
    notes: "Regex ^\\d{8}$ verifie exactement 8 chiffres. Empeche les injections."

  - id: PROT-005
    category: RT
    title: "Migration automatique des hash legacy vers PBKDF2"
    location: "lib/features/lock/lock_provider.dart:169-195"
    effectiveness: "partielle"
    notes: "Les anciens formats SHA-256 (avec ou sans sel) sont migres vers PBKDF2 lors de la verification. Mais le hash legacy reste vulnerable tant que l'utilisateur n'entre pas le bon PIN."

  - id: PROT-006
    category: RT
    title: "Limitation de securite documentee (SE-PIN-011)"
    location: "lib/features/lock/lock_provider.dart:14-18"
    effectiveness: "faible"
    notes: "La limitation des String Dart immutables est documentee mais pas mitigee. Le PIN reste en memoire apres usage."

  # ============================================
  # FW - Framework Flutter
  # ============================================

  - id: PROT-007
    category: FW
    title: "Auto-effacement du presse-papiers apres 3 secondes"
    location: "lib/shared/widgets/copyable_info.dart:33-35"
    effectiveness: "partielle"
    notes: "Le presse-papiers est efface apres 3 secondes avec Clipboard.setData(text: ''). Protection limitee car un malware surveille en continu."

  - id: PROT-008
    category: FW
    title: "Rate limiting PIN avec backoff exponentiel"
    location: "lib/features/lock/lock_provider.dart:134-141"
    effectiveness: "faible"
    notes: "Backoff progressif (30s -> 300s) apres 5 echecs. Mais stocke dans SharedPreferences en texte clair — un attaquant peut reset le compteur."

  # ============================================
  # OS - Systeme d'exploitation
  # ============================================

  - id: PROT-009
    category: OS
    title: "Echappement shell POSIX et PowerShell pour les commandes"
    location: "lib/core/command_runner.dart:69-78"
    effectiveness: "forte"
    notes: "Fonctions _shellQuote() et _psQuote() pour echapper les arguments. Previent l'injection de commandes dans pkexec/osascript/PowerShell."

  - id: PROT-010
    category: OS
    title: "Nettoyage des repertoires temporaires dans des blocs finally"
    location: "lib/core/command_runner.dart:101,127"
    effectiveness: "partielle"
    notes: "Les scripts temporaires (Windows PS1, macOS sh) sont supprimes apres execution. Mais le script existe entre ecriture et suppression (fenetre TOCTOU)."

  - id: PROT-011
    category: OS
    title: "chmod 700 sur les scripts temporaires avant execution pkexec"
    location: "lib/features/ssh_setup/ssh_setup_provider.dart:293-294"
    effectiveness: "partielle"
    notes: "chmod 700 restreint l'acces au proprietaire. Meme pattern dans security_commands.dart et wol_setup_provider.dart. Mais ne protege pas contre un attaquant root ou le meme utilisateur."

  - id: PROT-012
    category: OS
    title: "Permissions 0700 sur le repertoire d'etat Tailscale"
    location: "tailscale-daemon/main.go:69"
    effectiveness: "partielle"
    notes: "Repertoire ~/.local/share/chill-app/tailscale/ avec permissions 0700. Protege contre les autres utilisateurs mais pas contre les processus du meme utilisateur."

  - id: PROT-013
    category: OS
    title: "Module de securite OS avec detection et toggles"
    location: "lib/features/security/security_commands.dart"
    effectiveness: "partielle"
    notes: "Detecte et affiche l'etat du pare-feu, AppArmor, fail2ban, RDP, SMBv1, etc. Permet d'activer/desactiver via pkexec. Mais les toggles disable* sont aussi dangereux."

