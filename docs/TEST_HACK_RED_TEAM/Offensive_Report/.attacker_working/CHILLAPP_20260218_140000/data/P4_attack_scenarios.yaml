        tool: "python3"
        result: "Les cles PIN sont supprimees. isEnabled retourne false (lock_provider.dart:65: prefs.getString(_pinHashKey) != null)"
        detection_risk: "basse"
      - step: 4
        action: "Relancer l'application"
        command: "# Ouvrir ChillApp normalement"
        tool: "lancement app"
        result: "L'app demarre sans ecran de verrouillage — acces complet a l'interface"
        detection_risk: "basse"
    impact: "Contournement total du lock PIN. Acces a l'integralite de l'interface: configuration SSH, Tailscale, securite OS, WoL."
    severity: CRITIQUE
    cvss: 8.1
    evidence:
      file: "lib/features/lock/lock_provider.dart"
      line: 65
      code: "final hasPin = prefs.getString(_pinHashKey) != null;"
      issue: "L'etat isEnabled depend uniquement de la presence d'une cle dans un fichier texte clair. Supprimer la cle = lock desactive."
    estimated_time: "5 minutes"
    tools_required: ["python3 ou editeur de texte", "acces filesystem"]
