        result: "Fichier SharedPreferences localise (fichier JSON texte clair)"
        detection_risk: "basse"
      - step: 2
        action: "Lire le contenu et identifier les cles PIN"
        command: "cat shared_preferences.json | python3 -m json.tool | grep -E 'pin_hash|pin_salt|pin_failed|pin_locked'"
        tool: "cat/grep"
        result: "Cles identifiees: pin_hash, pin_salt, pin_failed_attempts, pin_locked_until"
        detection_risk: "basse"
      - step: 3
        action: "Supprimer les cles PIN pour desactiver le lock"
