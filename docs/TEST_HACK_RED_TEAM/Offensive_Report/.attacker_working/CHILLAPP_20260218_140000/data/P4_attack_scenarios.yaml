        action: "Localiser le binaire daemon Tailscale"
        command: "find ~/.local/share/chill-app/ /usr/lib/chill-app/ /opt/chill-app/ -name 'chill-tailscale*' 2>/dev/null"
        tool: "find/bash"
        result: "Chemin du binaire identifie (ex: ~/.local/share/chill-app/chill-tailscale-linux-amd64)"
        detection_risk: "basse"
      - step: 2
        action: "Compiler un binaire malveillant avec le meme nom"
        command: "go build -o chill-tailscale-linux-amd64 malicious_daemon.go"
        tool: "Go compiler"
        result: "Binaire malveillant pret — inclut un reverse shell + forwarding SSH intact pour masquer l'attaque"
        detection_risk: "basse"
      - step: 3
        action: "Remplacer le binaire original"
        command: "cp malicious_daemon ~/.local/share/chill-app/chill-tailscale-linux-amd64 && chmod +x ~/.local/share/chill-app/chill-tailscale-linux-amd64"
        tool: "cp/chmod"
        result: "Le binaire original est remplace. Aucune alerte car aucune verification d'integrite."
        detection_risk: "basse"
      - step: 4
        action: "Attendre le redemarrage de l'app ou le forcer"
        command: "# L'utilisateur clique sur 'Connecter Tailscale' dans l'interface"
        tool: "attente"
        result: "L'app execute Process.start(daemonPath, []) sur le binaire malveillant (tailscale_provider.dart:141)"
        detection_risk: "basse"
      - step: 5
        action: "Le daemon malveillant s'execute avec acces Tailscale + SSH forwarding"
        command: "# Le reverse shell contacte le serveur C2 de l'attaquant"
        tool: "reverse shell"
        result: "Execution de code avec acces au reseau Tailscale, aux cles WireGuard, et au SSH forwarding"
        detection_risk: "moyenne"
    impact: "Execution de code au demarrage de l'app. L'attaquant controle le daemon Tailscale, accede au reseau VPN, et peut utiliser le SSH forwarding pour atteindre d'autres machines du tailnet."
    severity: CRITIQUE
    cvss: 9.3
    evidence:
      file: "lib/features/tailscale/tailscale_provider.dart"
      line: 141
      code: "_daemon = await Process.start(daemonPath, []);"
      issue: "Aucune verification de checksum, hash ou signature avant execution. _getDaemonPath() (lignes 92-129) cherche le binaire sans jamais verifier son integrite."
