        result: "Brute force de 10^8 combinaisons (8 chiffres). ~24h sur GPU, ~1 semaine sur CPU."
        detection_risk: "basse"
      - step: 3
        action: "Alternative rapide: reset le rate limiting et brute force en ligne"
        command: "while true; do python3 -c \"import json; f=open('shared_preferences.json','r+'); d=json.load(f); d['pin_failed_attempts']=0; d.pop('pin_locked_until',None); f.seek(0); f.truncate(); json.dump(d,f); f.close()\"; # tenter le PIN dans l'interface; done"
        tool: "python3 + interface ChillApp"
        result: "Rate limiting contourne. Tentatives illimitees possibles."
        detection_risk: "basse"
    impact: "PIN cracke par brute force offline ou online (apres reset du rate limiting). 10^8 combinaisons pour 8 chiffres."
    severity: HAUTE
    cvss: 6.5
    evidence:
      file: "lib/features/lock/lock_provider.dart"
      line: 215
      code: "await prefs.setInt(_lockedUntilKey, newLockedUntil.millisecondsSinceEpoch);"
      issue: "Le compteur et le timestamp sont dans SharedPreferences — modifiables par tout processus du meme utilisateur."
    estimated_time: "24 heures (brute force offline) ou illimite (online avec reset)"
    tools_required: ["python3", "hashlib", "acces SharedPreferences"]
    detection_difficulty: "difficile"
    indicators_of_compromise:
