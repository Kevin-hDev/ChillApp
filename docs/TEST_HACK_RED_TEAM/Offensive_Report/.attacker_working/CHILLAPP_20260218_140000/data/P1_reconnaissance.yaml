attack_surface:
  network:
    protocols: ["SSH", "WireGuard/Tailscale", "WoL_magic_packet"]
    ports: [22, 41641, 9]
    exposure: "tailscale_mesh + LAN"
    notes: "SSH forwarding via Tailscale expose le port 22 local sur le mesh. WoL permet le reveil a distance depuis le LAN."

  storage:
    sensitive_stores:
      - type: "SharedPreferences"
        platform: "all"
        encryption_at_rest: false
        contents: ["pin_hash", "pin_salt", "failed_attempts", "locked_until", "theme", "locale", "onboarding"]
      - type: "Tailscale state directory"
        platform: "all"
        encryption_at_rest: false
        contents: ["tailscale_keys", "tailscale_state"]
        paths:
          linux: "~/.local/share/chill-app/tailscale/"
          windows: "%LOCALAPPDATA%/chill-app/tailscale/"
          macos: "~/Library/Application Support/chill-app/tailscale/"
    notes: "Aucun stockage chiffre au repos. SharedPreferences = fichier texte. Le repertoire Tailscale contient les cles du noeud."

  crypto:
    libraries: ["crypto (dart)", "PBKDF2 custom implementation"]
    algorithms: ["PBKDF2-HMAC-SHA256 (100k iterations)", "SHA-256 (legacy migration)"]
    notes: "Implementation PBKDF2 maison dans lock_provider.dart. Comparaison en temps constant. Migration depuis anciens formats."

  platform:
    desktop:
      - "Pas de sandbox (app desktop native)"
      - "Elevation de privileges (pkexec/RunAs/osascript)"
      - "IPC stdin/stdout avec daemon Go"
      - "Scripts temporaires dans /tmp executes en root"
      - "Modification directe de fichiers systeme (sshd_config, resolv.conf, sysctl)"
      - "Creation de services systemd"
      - "Modification du registre Windows"
      - "Fichiers .desktop et .plist pour persistance"

  human:
    auth_methods: ["PIN 8 chiffres"]
    sensitive_ui: ["Ecran de verrouillage", "Informations reseau (IP, MAC, username)"]

  supply_chain:
    risks:
      - "3 binaires Go pre-compiles (~33Mo chacun) sans verification d'integrite (checksum/signature)"
      - "google_fonts telecharge les polices au runtime depuis Internet"
      - "Dependances pub.dev sans lock file de hash"

  ai_threats:
    vulnerable_to_fuzzing:
      - "JSON parser du daemon Go (stdin)"
      - "PBKDF2 custom implementation"
    supply_chain_risk:
      - "Binaires Go pre-compiles non signes"
      - "Dependances pub.dev"
    ai_re_exposure:
      - "App desktop Flutter facilement decompilable (dart2js, kernel snapshot)"
      - "Binaire Go analysable par IA (Ghidra + LLM)"
