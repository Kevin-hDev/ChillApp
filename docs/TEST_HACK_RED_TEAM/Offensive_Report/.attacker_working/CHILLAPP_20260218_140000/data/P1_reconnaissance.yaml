  - id: EP-005
    type: "ipc_channel"
    location: "lib/features/tailscale/tailscale_provider.dart:293-296"
    protocol: "JSON_stdin_stdout"
    authentication: "none"
    exposure: "local_process"
    data_handled: ["tailscale_commands", "auth_urls", "peer_info"]
    notes: "Communication JSON sur stdin/stdout avec le daemon Go. Pas de chiffrement ni authentification de l'IPC."

  - id: EP-006
    type: "network_listener"
    location: "tailscale-daemon/main.go:158"
    protocol: "TCP/SSH"
    authentication: "tailscale_mesh"
    exposure: "tailscale_network"
    data_handled: ["ssh_traffic"]
    notes: "Ecoute le port 22 sur le reseau Tailscale. Forwarde vers localhost:22. Pas de filtrage additionnel."

  - id: EP-007
    type: "local_storage"
    location: "lib/features/lock/lock_provider.dart:57-60"
    protocol: "SharedPreferences"
    authentication: "none"
    exposure: "local_filesystem"
    data_handled: ["pin_hash", "pin_salt", "failed_attempts", "locked_until"]
    notes: "Texte clair sur disque. Fichier lisible par tout processus du meme utilisateur."

  - id: EP-008
    type: "temp_script_execution"
    location: "lib/features/ssh_setup/ssh_setup_provider.dart:285-287"
    protocol: "temp_file_to_pkexec"
    authentication: "pkexec"
    exposure: "local_elevated"
    data_handled: ["bash_scripts_root"]
    notes: "Script temporaire ecrit dans /tmp puis execute en root. Fenetre TOCTOU documentee."

  - id: EP-009
    type: "autostart_persistence"
    location: "lib/features/settings/settings_provider.dart:94-123"
    protocol: "desktop_file/plist/registry"
    authentication: "none"
    exposure: "local_persistence"
    data_handled: ["executable_path"]
