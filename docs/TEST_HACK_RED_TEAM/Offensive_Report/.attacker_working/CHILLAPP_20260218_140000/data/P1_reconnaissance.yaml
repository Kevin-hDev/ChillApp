schema_version: "1.0.0"
phase: 1
generated_at: "2026-02-18T14:10:00Z"

project_context:
  name: "ChillApp"
  type: "desktop_configuration_hub"
  description: "Hub central pour configurer SSH, Wake-on-LAN, Tailscale et la securite OS sur desktop (Linux, Windows, macOS)"
  tech_stack:
    languages: ["dart", "go"]
    frameworks: ["flutter"]
    platforms: ["linux", "windows", "macos"]
    key_dependencies:
      - name: "flutter"
        version: "3.38.7"
        security_notes: "Framework UI, pas d'audit specifique necessaire"
        attack_relevance: BASSE
      - name: "flutter_riverpod"
        version: "^3.2.1"
        security_notes: "Gestion d'etat, pas de surface d'attaque directe"
        attack_relevance: INFO
      - name: "go_router"
        version: "^16.2.2"
        security_notes: "Navigation, pas de surface d'attaque directe"
        attack_relevance: INFO
      - name: "shared_preferences"
        version: "^2.5.4"
        security_notes: "Stockage en TEXTE CLAIR sur disque. Contient le hash PIN, le sel, le compteur d'echecs et le timestamp de verrouillage"
        attack_relevance: CRITIQUE
      - name: "crypto"
        version: "^3.0.7"
        security_notes: "Package Dart officiel pour PBKDF2/SHA-256. Implementation PBKDF2 custom dans lock_provider.dart"
        attack_relevance: HAUTE
      - name: "google_fonts"
        version: "^8.0.1"
        security_notes: "Telecharge les polices au runtime depuis Internet"
        attack_relevance: BASSE
      - name: "tsnet (Go)"
        version: "latest (tailscale.com/tsnet)"
        security_notes: "Daemon Go pre-compile. 3 binaires de ~33Mo sans verification d'integrite"
        attack_relevance: CRITIQUE
      - name: "tailscale.com/client/tailscale"
        version: "latest"
        security_notes: "Client Tailscale Go pour le daemon"
        attack_relevance: HAUTE

  codebase_stats:
    total_dart_files: 44
    total_dart_lines: 10177
    total_go_files: 1
    total_go_lines: 435
    critical_files:
      - "lib/core/command_runner.dart"
      - "lib/features/security/security_commands.dart"
      - "lib/features/ssh_setup/ssh_setup_provider.dart"
      - "lib/features/lock/lock_provider.dart"
      - "lib/features/tailscale/tailscale_provider.dart"
      - "lib/features/wol_setup/wol_setup_provider.dart"
      - "lib/features/settings/settings_provider.dart"
      - "lib/core/network_info.dart"
      - "tailscale-daemon/main.go"

target_inventory:
  - id: TGT-001
    name: "Systeme d'execution de commandes"
    type: "core_service"
    files: ["lib/core/command_runner.dart"]
    lines: 132
    security_level: "critique"
    attack_categories: ["FLT", "PHY"]
    why_target: "Point de passage UNIQUE pour toutes les commandes OS. Controle l'elevation de privileges. Si compromis, l'attaquant controle tout le systeme."

  - id: TGT-002
    name: "Module de securite OS"
    type: "privileged_service"
    files: ["lib/features/security/security_commands.dart", "lib/features/security/security_provider.dart"]
    lines: 2099
    security_level: "critique"
    attack_categories: ["FLT", "PHY", "NET"]
    why_target: "1558 lignes de commandes systeme privilegiees. Modifie le pare-feu, DNS, registre, sysctl, services systemd. Peut DESACTIVER les protections de securite."

  - id: TGT-003
    name: "Configuration SSH"
    type: "privileged_service"
    files: ["lib/features/ssh_setup/ssh_setup_provider.dart"]
    lines: 387
    security_level: "critique"
    attack_categories: ["SSH", "PHY"]
    why_target: "Installe et configure OpenSSH. Ecrit des scripts bash temporaires executes en root via pkexec. Modifie sshd_config."

  - id: TGT-004
    name: "Daemon Tailscale + IPC"
    type: "external_binary"
    files: ["lib/features/tailscale/tailscale_provider.dart", "tailscale-daemon/main.go"]
    lines: 819
    security_level: "critique"
    attack_categories: ["NET", "FLT", "SUP"]
    why_target: "Binaire Go pre-compile sans verification d'integrite. Ecoute le port 22 sur le reseau Tailscale. Forwarde les connexions SSH vers localhost:22. IPC par JSON sur stdin/stdout."

  - id: TGT-005
    name: "Systeme de verrouillage PIN"
    type: "auth_service"
    files: ["lib/features/lock/lock_provider.dart", "lib/features/lock/lock_screen.dart"]
    lines: 664
    security_level: "haute"
    attack_categories: ["STO", "CRY", "PHY"]
    why_target: "PIN stocke dans SharedPreferences (texte clair sur disque). Hash PBKDF2 mais suppression du hash = contournement du lock. PIN en memoire non effacable (limitation Dart)."

  - id: TGT-006
    name: "Configuration Wake-on-LAN"
    type: "privileged_service"
    files: ["lib/features/wol_setup/wol_setup_provider.dart"]
    lines: 404
    security_level: "haute"
    attack_categories: ["NET", "PHY"]
    why_target: "Active WoL sur la machine. Cree un service systemd. Expose l'adresse MAC. Permet le reveil a distance."

  - id: TGT-007
    name: "Autostart / Persistance"
    type: "persistence"
    files: ["lib/features/settings/settings_provider.dart"]
    lines: 148
    security_level: "haute"
    attack_categories: ["FLT", "PHY"]
    why_target: "Ecrit des fichiers .desktop (Linux), cles de registre (Windows), plist (macOS) pour le lancement au demarrage. Chemin de l'executable non echappe dans le fichier .desktop Linux."

  - id: TGT-008
    name: "Collecte d'informations reseau"
    type: "info_service"
    files: ["lib/core/network_info.dart"]
    lines: 161
    security_level: "moyenne"
    attack_categories: ["NET"]
    why_target: "Collecte IP, MAC, username, hostname. Interpole des noms d'interface dans des commandes bash (protege par regex)."

entry_points:
  - id: EP-001
    type: "system_command_execution"
    location: "lib/core/command_runner.dart:36"
    protocol: "Process.run"
    authentication: "none"
    exposure: "local_process"
    data_handled: ["commands", "arguments", "stdout", "stderr"]
    notes: "Point central d'execution de commandes. Timeout ne tue pas le processus (limitation Dart)."

  - id: EP-002
    type: "privilege_escalation_linux"
    location: "lib/core/command_runner.dart:106"
    protocol: "pkexec"
    authentication: "polkit_dialog"
    exposure: "local_elevated"
    data_handled: ["elevated_commands"]
    notes: "Elevation de privileges via pkexec. Les arguments sont passes comme liste separee."

  - id: EP-003
    type: "privilege_escalation_windows"
    location: "lib/core/command_runner.dart:82-99"
    protocol: "Start-Process -Verb RunAs"
    authentication: "uac_dialog"
    exposure: "local_elevated"
    data_handled: ["powershell_scripts"]
    notes: "Script .ps1 temporaire dans Directory.systemTemp. TOCTOU potentiel."

  - id: EP-004
    type: "privilege_escalation_macos"
    location: "lib/core/command_runner.dart:107-128"
    protocol: "osascript"
    authentication: "macos_auth_dialog"
    exposure: "local_elevated"
    data_handled: ["bash_scripts"]
