    title: "Binaire daemon Tailscale sans verification d'integrite"
    category: SUP
    severity: CRITIQUE
    cvss: 9.3
    cwe: "CWE-494"
    description: "Le daemon Go chill-tailscale (~33Mo par plateforme) est charge et execute sans aucune verification de checksum, signature ou hash. Un attaquant qui remplace le binaire obtient une execution de code au demarrage de l'app, avec forwarding SSH et acces au reseau Tailscale."
    evidence:
      file: "lib/features/tailscale/tailscale_provider.dart"
      line: 141
      code: "_daemon = await Process.start(daemonPath, []);"
      issue: "Process.start() execute le binaire sans verifier son integrite. _getDaemonPath() cherche dans plusieurs repertoires (lignes 92-129) mais ne verifie jamais un hash ou une signature."
    flow_refs: ["DF-003", "DF-009"]
    secret_refs: ["SEC-006"]
