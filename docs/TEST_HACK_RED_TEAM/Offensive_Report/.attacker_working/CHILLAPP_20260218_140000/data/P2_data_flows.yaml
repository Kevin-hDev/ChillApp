trust_boundaries:
  - id: TB-001
    name: "App Flutter <-> pkexec/UAC (frontiere de privileges)"
    from_trust: "user_process"
    to_trust: "root_process"
    crossing_flows: ["DF-005", "DF-006", "DF-007"]
    protection_at_boundary: "dialogue pkexec/UAC demandant le mot de passe"
    attack_opportunities:
      - "TOCTOU: modifier le script temporaire entre ecriture et execution pkexec"
      - "Social engineering: convaincre l'utilisateur d'approuver pkexec pour un script malveillant"

  - id: TB-002
    name: "App Flutter <-> Daemon Go (frontiere IPC)"
    from_trust: "flutter_ui_process"
    to_trust: "go_daemon_process"
    crossing_flows: ["DF-003", "DF-004"]
    protection_at_boundary: "AUCUNE - JSON en clair sur stdin/stdout"
    attack_opportunities:
      - "Remplacement du binaire daemon avant demarrage"
      - "Injection de commandes JSON si un processus peut ecrire sur le stdin du daemon"
      - "Interception stdout pour voler les auth URLs"

  - id: TB-003
    name: "Reseau Tailscale <-> localhost SSH (frontiere reseau)"
    from_trust: "tailscale_encrypted_mesh"
    to_trust: "localhost_loopback"
    crossing_flows: ["DF-009"]
    protection_at_boundary: "WireGuard decryption + loopback TCP"
    attack_opportunities:
      - "Tout appareil autorise sur le tailnet peut se connecter au port 22"
      - "Pas de filtrage additionnel par le daemon Go (pas de whitelist d'IPs Tailscale)"
      - "Compromission d'un autre noeud Tailscale = acces SSH direct"

  - id: TB-004
    name: "Memoire app <-> SharedPreferences disque (frontiere stockage)"
    from_trust: "app_memory"
    to_trust: "filesystem_plaintext"
    crossing_flows: ["DF-001", "DF-002"]
    protection_at_boundary: "AUCUNE - SharedPreferences = fichier texte sans chiffrement"
    attack_opportunities:
      - "Lecture directe du fichier par tout processus du meme utilisateur"
      - "Suppression du hash PIN pour contourner le verrou"
      - "Modification du compteur d'echecs pour reset le rate limiting"

  - id: TB-005
    name: "Fichier temporaire <-> Execution root (frontiere TOCTOU)"
    from_trust: "user_writable_temp"
    to_trust: "root_execution"
    crossing_flows: ["DF-005", "DF-006", "DF-007"]
    protection_at_boundary: "chmod 700 + createTemp (nom aleatoire)"
    attack_opportunities:
      - "Race condition entre ecriture et execution (fenetre temporelle etroite)"
      - "Un attaquant root peut toujours modifier (mais s'il est deja root, c'est inutile)"
      - "Symlink attack si /tmp est sur un filesystem sans sticky bit"
