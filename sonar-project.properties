# SonarCloud Configuration for Chill Desktop

# Required metadata
sonar.projectKey=chill-desktop
sonar.projectName=Chill Desktop
sonar.projectVersion=1.0.0
sonar.organization=kevin-hdev

# Source code directories
sonar.sources=lib,tailscale-daemon
sonar.tests=test

# Source encoding
sonar.sourceEncoding=UTF-8

# Language detection
sonar.language=dart,go,sh

# Exclusions
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/generated/**,**/build/**,**/.dart_tool/**,**/android/**,**/ios/**,**/web/**,**/windows/**,**/linux/**,**/macos/**

# Test exclusions
sonar.test.exclusions=**/*_test.dart

# Coverage (if available)
# sonar.dart.coverage.reportPath=coverage/lcov.info

# Dart specific
sonar.dart.analyzer.reportPath=flutter-analyze-results.txt

# Go specific (for tailscale-daemon)
sonar.go.coverage.reportPaths=coverage.out

# Additional analysis parameters
sonar.scm.provider=git
sonar.verbose=false

# Quality Gate
sonar.qualitygate.wait=false
